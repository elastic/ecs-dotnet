version: 2
updates:

  # GitHub actions
  - package-ecosystem: "github-actions"
    directories:
      - "/"
      - "/.github/workflows/*"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "22:00"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: pre-commit
    schedule:
      interval: 'weekly'
      day: 'sunday'
      time: '22:00'
    open-pull-requests-limit: 5
    labels:
      - 'changelog:dependencies'
